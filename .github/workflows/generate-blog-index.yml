name: Generate Blog Index

on:
  push:
    branches: [main]
    paths:
      - "blog/posts/**.md"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run generate script
        run: python generate_blog_index.py

      - name: Commit posts.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/posts/posts.json sitemap.xml
          git diff --cached --quiet || git commit -m "chore: auto-update posts.json and sitemap.xml"
          git push
