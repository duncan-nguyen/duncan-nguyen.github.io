<svg width="100%" height="100%" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient (Slate/Dark Tech Feel) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Center Slash Premium Gradient (Cyan to Blue) -->
    <linearGradient id="slashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- Code Brackets Subtle Gradient -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
    
    <!-- Outer Glow / Shadow (Optional, subtle depth) -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background App Icon Shape (Squircle/Rounded Square) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" filter="url(#shadow)" />
  <rect width="510" height="510" x="1" y="1" rx="111" fill="none" stroke="#334155" stroke-width="2" />

  <!-- The Left Bracket `<` -->
  <path d="M 150 186 L 80 256 L 150 326" fill="none" stroke="url(#bracketGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- The Right Bracket `>` -->
  <path d="M 362 186 L 432 256 L 362 326" fill="none" stroke="url(#bracketGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />

  <!-- The Central Developer Slash `/` -->
  <path d="M 216 346 L 296 166" fill="none" stroke="url(#slashGrad)" stroke-width="44" stroke-linecap="round" />
</svg>
